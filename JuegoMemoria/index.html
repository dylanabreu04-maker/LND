<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen: Memory Game JS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="contenedor-principal">
        <h1 class="titulo-juego">Examen Memory Game</h1>
        
        <div id="tablero-juego" class="tablero"></div>

        <div class="panel-control">
            <div id="movimientos" class="contador-movimientos">Movimientos: 0</div>
            <button class="btn btn-reiniciar">
                Reiniciar
            </button>
        </div>
    </div>

    <div id="modal-victoria" class="modal-fondo oculto">
        <div class="modal-mensaje">
            <h2 class="titulo-victoria">¡VICTORIA!</h2>
            <p class="texto-victoria">¡Has encontrado todos los pares!</p>
            <button class="btn btn-jugar">
                Jugar de Nuevo
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
